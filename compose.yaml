services:

  runtime:
    image: harbor.machine:8081/ftra/runtime:14.2.0.138
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      - SHARED_NETWORK=false
      - TZ
    volumes:
      - ${VOLUME:-/opt/ftra}:/runtime_persistence
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:5161:5161"
      - "5936:5936"
    userns_mode: host
    security_opt:
      - apparmor:${APPARMOR_PROFILE:-unconfined}

secrets:
  web_login_password:
    environment: "WEB_LOGIN_PASSWORD"
